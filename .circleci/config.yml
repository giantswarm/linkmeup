version: 2.1

orbs:
  architect: giantswarm/architect@9.1.0

workflows:
  test:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: template
          architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
          filters:
            # Trigger job also on git tag.
            tags:
              only: /^v.*/
      - architect/upload-release-assets:
          binary: linkmeup
          context: architect
          requires:
            - go-build
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
